#cloud-config
# Hetzner cloud-init for SCAIP remote client only (no Apache/Kamailio).

hostname: scaip-client
manage_etc_hosts: true

package_update: true
package_upgrade: true

packages:
  - git
  - openjdk-17-jdk
  - maven
  - ufw
  - curl

# Generate hashed password: openssl passwd -6  (or: mkpasswd -m sha-512)
users:
  - name: scaip
    groups: sudo
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    lock_passwd: false
    passwd: '$6$cQanvixKDrz.mdsy$QNtsUe13ylYOCBD5zTAf1ibKpXzvijG9kDPxfFV5n0CP6Dlr84RRZQ7f.FrTKT1DQRUtTRtWLlQw/gsI/SIQt0'
    ssh_authorized_keys:
      - ssh-ed25519 YOUR_PUBLIC_KEY_HERE

write_files:
  - path: /etc/ssh/sshd_config.d/99-allow-password-auth.conf
    permissions: '0644'
    content: |
      PasswordAuthentication yes
  # Default server address; edit before first boot or change here and rebuild image.
  - path: /etc/scaip-client/server.conf
    permissions: '0644'
    content: |
      SCAIP_SERVER_HOST=scaip.syntilio.com
      SCAIP_SERVER_PORT=5062

runcmd:
  - systemctl enable ssh
  - systemctl restart ssh
  - ufw allow OpenSSH
  - ufw --force enable
  - mkdir -p /opt
  - cd /opt
  - git clone https://github.com/j-a-a-p/scaip.git
  - chmod +x /opt/scaip/client-config/bootstrap.sh
  - /opt/scaip/client-config/bootstrap.sh 2>&1 | tee /var/log/scaip-client-bootstrap.log
  - mkdir -p /root/scaip-install-logs
  - cp /var/log/scaip-client-bootstrap.log /root/scaip-install-logs/ 2>/dev/null || true
  - cp /var/log/cloud-init-output.log /root/scaip-install-logs/ 2>/dev/null || true
  - cp /var/log/cloud-init.log /root/scaip-install-logs/ 2>/dev/null || true
