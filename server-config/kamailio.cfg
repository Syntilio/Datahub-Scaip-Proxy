# Module path on Ubuntu. To find: dpkg -L kamailio | grep 'kamailio/modules' | head -1 | xargs dirname
# Or: ls -d /usr/lib/*/kamailio/modules 2>/dev/null
mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules"

# Log level: 0=minimal, 1=WARN, 2=NOTICE, 3=INFO, 4=DEBUG. Use 3 or 4 only when debugging startup.
debug=3

#enable_tls=yes
# So requests to this host (e.g. sip:scaip@scaip.syntilio.com) are considered local and we relay to backends (avoids 403 Not relaying).
alias="scaip.syntilio.com"
# UDP 5060 localhost (no-fork needs one UDP). TCP 5060 public (no TLS). TLS 5061 public.
listen=udp:127.0.0.1:5060
listen=udp:0.0.0.0:5060

listen=tcp:0.0.0.0:5060
#listen=tls:0.0.0.0:5061

log_facility=LOG_LOCAL0
log_stderror=no

#loadmodule "tls.so"
#modparam("tls", "config", "/etc/kamailio/tls.cfg")
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "xlog.so"
loadmodule "textops.so"
loadmodule "pv.so"
# Dispatcher: load balancing across SCAIP backends (setid=1) over TCP, round-robin + failover
loadmodule "dispatcher.so"
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")

route {
    xlog("L_INFO", "[$TF] [CALL_ID=$ci] incoming request method=$rm from=$fu to=$tu src=$si:$sp content_type=$ct cl=$cl\n");

    if (!is_method("MESSAGE")) {
        xlog("L_INFO", "[$TF] [CALL_ID=$ci] rejected request: method is not MESSAGE, method=$rm\n");
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    xlog("L_INFO", "[$TF] [CALL_ID=$ci] MESSAGE request detected, checking for XML body\n");
    route(SCAIP_XML_CHECK);
    exit;
}

route[SCAIP_XML_CHECK] {
    if ($ct =~ "xml" || search_body("<?xml") || search_body("<alarm") || search_body("<scaip")) {
        xlog("L_INFO", "[$TF] [CALL_ID=$ci] MESSAGE contains XML, forwarding to Java backend via dispatcher\n");
        xlog("L_INFO", "[$TF] [CALL_ID=$ci] MESSAGE XML body:\n$rb\n");
        route(SCAIP_DISPATCH);
        exit;
    }

    xlog("L_INFO", "[$TF] [CALL_ID=$ci] MESSAGE rejected: body is not XML ct=$ct body=\n$rb\n");
    sl_send_reply("415", "Unsupported Media Type");
}

route[SCAIP_DISPATCH] {
    if (!ds_select_dst("1", "0")) {
        xlog("L_INFO", "[$TF] [CALL_ID=$ci] dispatcher error: no destination available for MESSAGE\n");
        sl_send_reply("503", "Service Unavailable");
        exit;
    }

    xlog("L_INFO", "[$TF] [CALL_ID=$ci] dispatcher selected destination ru=$ru du=$du\n");
    t_on_failure("LB_FAILOVER");

    if (!t_relay()) {
        xlog("L_INFO", "[$TF] [CALL_ID=$ci] relay failed for MESSAGE to ru=$ru du=$du\n");
        sl_reply_error();
    }
    exit;
}

failure_route[LB_FAILOVER] {
    xlog("L_INFO", "[$TF] [CALL_ID=$ci] relay failure detected, trying next dispatcher destination\n");

    if (ds_next_dst()) {
        xlog("L_INFO", "[$TF] [CALL_ID=$ci] failover selected next destination ru=$ru du=$du\n");
        if (!t_relay()) {
            xlog("L_INFO", "[$TF] [CALL_ID=$ci] failover relay failed ru=$ru du=$du\n");
            t_reply("503", "Service Unavailable");
        }
        exit;
    }

    xlog("L_INFO", "[$TF]  [CALL_ID=$ci]no more dispatcher destinations available\n");
    t_reply("503", "Service Unavailable");
}