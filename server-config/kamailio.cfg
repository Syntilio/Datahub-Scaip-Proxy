listen=tls:0.0.0.0:5061

loadmodule "tls.so"
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "xlog.so"

route {
    if (is_method("MESSAGE")) {
        xlog("L_INFO", "=== SCAIP MESSAGE RECEIVED ===\n");
        xlog("L_INFO", "Call-ID: $ci\n");
        xlog("L_INFO", "Body:\n$rb\n");
        forward("127.0.0.1", 5062);
        exit;
    }

    sl_send_reply("405", "Method Not Allowed");
}