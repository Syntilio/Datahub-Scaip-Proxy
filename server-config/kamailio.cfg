# Module path on Ubuntu. To find: dpkg -L kamailio | grep 'kamailio/modules' | head -1 | xargs dirname
# Or: ls -d /usr/lib/*/kamailio/modules 2>/dev/null
mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules"

# Log level: 0=minimal, 1=WARN, 2=NOTICE, 3=INFO, 4=DEBUG. Use 3 or 4 only when debugging startup.
debug=3

#enable_tls=yes
# So requests to this host (e.g. sip:scaip@scaip.syntilio.com) are considered local and we relay to backends (avoids 403 Not relaying).
alias="scaip.syntilio.com"
# UDP 5060 localhost (no-fork needs one UDP). TCP 5060 public (no TLS). TLS 5061 public.
listen=udp:127.0.0.1:5060
listen=tcp:0.0.0.0:5060
#listen=tls:0.0.0.0:5061

log_facility=LOG_LOCAL0
log_stderror=no

#loadmodule "tls.so"
#modparam("tls", "config", "/etc/kamailio/tls.cfg")
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "xlog.so"
loadmodule "textops.so"
loadmodule "pv.so"
# Dispatcher: load balancing across SCAIP backends (setid=1) over TCP, round-robin + failover
loadmodule "dispatcher.so"
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")

route {
    if (is_method("MESSAGE")) {
        xlog("L_INFO", "[$TS] SCAIP MESSAGE from=$fu to=$tu src=$si:$sp\n");
        route(SCAIP_FILTER);
        exit;
    }

    xlog("L_INFO", "[$TS] METHOD NOT ALLOWED: $rm\n");
    sl_send_reply("405", "Method Not Allowed");
}

route[SCAIP_FILTER] {
    if (search_body("<stc>0010</stc>") || search_body("<stc>0070</stc>")) {
        xlog("L_INFO", "[$TS] SCAIP stc matched — forwarding to backend\n");
        route(SCAIP_DISPATCH);
        exit;
    }

    xlog("L_INFO", "[$TS] SCAIP unknown stc — ignoring\n");
    sl_send_reply("200", "OK");
}

route[SCAIP_DISPATCH] {
    if (!ds_select_dst("1", "0")) {
        xlog("L_ERR", "[$TS] SCAIP NO DISPATCHER DESTINATION\n");
        sl_send_reply("503", "Service Unavailable");
        exit;
    }
    t_on_failure("LB_FAILOVER");
    t_relay();
}

failure_route[LB_FAILOVER] {
    if (ds_next_dst()) {
        xlog("L_INFO", "[$TS] SCAIP FAILOVER to next destination\n");
        t_relay();
        exit;
    }
    xlog("L_ERR", "[$TS] SCAIP no more destinations\n");
    t_reply("503", "Service Unavailable");
}