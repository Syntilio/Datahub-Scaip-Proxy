# Module path on Ubuntu. To find: dpkg -L kamailio | grep 'kamailio/modules' | head -1 | xargs dirname
# Or: ls -d /usr/lib/*/kamailio/modules 2>/dev/null
mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules"

# Log level: 0=minimal, 1=WARN, 2=NOTICE, 3=INFO, 4=DEBUG. Use 3 or 4 only when debugging startup.
debug=2

enable_tls=yes
# No-fork (-D) mode requires at least one UDP listen address
listen=udp:127.0.0.1:5060
listen=tls:0.0.0.0:5061

loadmodule "tls.so"
modparam("tls", "config", "/etc/kamailio/tls.cfg")
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "xlog.so"
# Dispatcher: load balancing and failover (requires kamailio-dispatcher or kamailio-modules)
loadmodule "dispatcher.so"
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")

route {
    if ($rm == "MESSAGE") {
        if (!ds_select_dst("1", "0")) {
            xlog("L_ERR", "=== SCAIP NO DISPATCHER DESTINATION ===\n");
            sl_send_reply("503", "Service Unavailable");
            exit;
        }
        t_on_failure("LB_FAILOVER");
        t_relay();
        exit;
    }

    xlog("L_INFO", "=== SCAIP METHOD NOT ALLOWED (405) === method=$rm\n");
    sl_send_reply("405", "Method Not Allowed");
}

# Failover: try next backend on timeout or 5xx
failure_route[LB_FAILOVER] {
    if (t_was_cancelled()) exit;
    if (ds_next_dst()) {
        xlog("L_INFO", "=== SCAIP LB FAILOVER to next destination ===\n");
        t_relay();
        exit;
    }
    xlog("L_ERR", "=== SCAIP LB no more destinations ===\n");
    t_reply("503", "Service Unavailable");
}