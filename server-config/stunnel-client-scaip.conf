; Stunnel client: accept plain TCP locally, connect to Kamailio via TLS.
; Usage: stunnel server-config/stunnel-client-scaip.conf (or let run-remote-client.sh start it)
;
; For server cert verification (recommended on Linux): set verifyChain = yes and either
;   CApath = /etc/ssl/certs   (Linux)
;   CAfile = /etc/ssl/cert.pem
; or on macOS (Homebrew): CAfile = /opt/homebrew/etc/openssl@3/cert.pem

[scaip-kamailio]
client = yes
accept = 127.0.0.1:15061
connect = scaip.syntilio.com:5061
; No CA bundle by default so it works on macOS (no /etc/ssl/certs). Set verifyChain = yes + CAfile/CApath for verification.
verifyChain = no
