#cloud-config

hostname: scaip
manage_etc_hosts: true

package_update: true
package_upgrade: true

packages:
  - git
  - openjdk-17-jdk
  - maven
  - kamailio
  - kamailio-tls-modules
  - kamailio-utils-modules
  - apache2
  - certbot
  - ufw
  - curl
  - fail2ban

# Generate hashed password: openssl passwd -6  (or: mkpasswd -m sha-512)
users:
  - name: scaip
    groups: sudo
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    lock_passwd: false
    passwd: '$6$cQanvixKDrz.mdsy$QNtsUe13ylYOCBD5zTAf1ibKpXzvijG9kDPxfFV5n0CP6Dlr84RRZQ7f.FrTKT1DQRUtTRtWLlQw/gsI/SIQt0'
    ssh_authorized_keys:
      - ssh-ed25519 YOUR_PUBLIC_KEY_HERE

write_files:
  - path: /etc/ssh/sshd_config.d/99-allow-password-auth.conf
    permissions: '0644'
    content: |
      PasswordAuthentication yes
  - path: /etc/sysctl.d/99-scaip.conf
    permissions: '0644'
    content: |
      net.ipv4.ip_forward=1
      net.ipv4.conf.all.rp_filter=1
      net.ipv4.tcp_syncookies=1

runcmd:
  - sysctl --system
  - systemctl enable ssh
  - systemctl restart ssh
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 5060/tcp
  - ufw allow 5061/tcp
  - ufw --force enable
  - mkdir -p /opt
  - cd /opt
  - git clone https://github.com/j-a-a-p/scaip.git
  - chmod +x /opt/scaip/server-config/bootstrap.sh
  - /opt/scaip/server-config/bootstrap.sh 2>&1 | tee /var/log/scaip-bootstrap.log
  - mkdir -p /root/scaip-install-logs
  - cp /var/log/scaip-bootstrap.log /root/scaip-install-logs/ 2>/dev/null || true
  - cp /var/log/cloud-init-output.log /root/scaip-install-logs/ 2>/dev/null || true
  - cp /var/log/cloud-init.log /root/scaip-install-logs/ 2>/dev/null || true