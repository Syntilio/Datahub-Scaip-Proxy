# Apache SSL vhost for SCAIP (Let's Encrypt).
# Installed by bootstrap when certbot succeeds. __DOMAIN__ is replaced at install time.
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName __DOMAIN__
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/__DOMAIN__/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/__DOMAIN__/privkey.pem
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1

    ErrorLog ${APACHE_LOG_DIR}/scaip-ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/scaip-ssl_access.log combined
</VirtualHost>
</IfModule>
